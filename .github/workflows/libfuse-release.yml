name: Auto release libfuse for Alpine

on:
  schedule:
    - cron: '23 3 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Optional libfuse ref override (tag / branch / commit). Empty means latest upstream tag.'
        required: false
        default: ''
      alpine_version:
        description: 'Alpine version'
        required: false
        default: '3.20'
      force:
        description: 'Force rebuild and release even if release tag already exists'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      source_ref: ${{ steps.pick.outputs.source_ref }}
      release_tag: ${{ steps.pick.outputs.release_tag }}
      release_name: ${{ steps.pick.outputs.release_name }}
      artifact_name: ${{ steps.pick.outputs.artifact_name }}
      should_build: ${{ steps.check.outputs.should_build }}
      alpine_version: ${{ steps.pick.outputs.alpine_version }}
    steps:
      - name: Resolve target tag
        id: pick
        env:
          INPUT_REF: ${{ inputs.ref }}
          INPUT_ALPINE: ${{ inputs.alpine_version || '3.20' }}
        run: |
          set -eu
          if [ -n "$INPUT_REF" ]; then
            SOURCE_REF="$INPUT_REF"
          else
            SOURCE_REF="$(git ls-remote --tags --refs https://github.com/libfuse/libfuse.git 'fuse-*' \
              | awk '{print $2}' \
              | sed 's#refs/tags/##' \
              | sort -V \
              | tail -n 1)"
          fi

          if [ -z "$SOURCE_REF" ]; then
            echo 'Failed to resolve libfuse tag' >&2
            exit 1
          fi

          SAFE_REF="$(printf '%s' "$SOURCE_REF" | tr '/:@ ' '----')"
          RELEASE_TAG="libfuse-${SAFE_REF}-apk${INPUT_ALPINE}"
          RELEASE_NAME="libfuse ${SOURCE_REF} for Alpine ${INPUT_ALPINE}"
          ARTIFACT_NAME="libfuse-alpine-${SAFE_REF}-apk${INPUT_ALPINE}"

          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "alpine_version=$INPUT_ALPINE" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ inputs.force || 'false' }}
          RELEASE_TAG: ${{ steps.pick.outputs.release_tag }}
        run: |
          set -eu
          if [ "$FORCE" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists, skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: discover
    if: needs.discover.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]
    container:
      image: alpine:${{ needs.discover.outputs.alpine_version }}
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Load libfuse preset
        run: |
          set -eu
          cat "$GITHUB_WORKSPACE/projects/libfuse/project.env" >> "$GITHUB_ENV"
          echo "SOURCE_REF=${{ needs.discover.outputs.source_ref }}" >> "$GITHUB_ENV"
          echo "ALPINE_VERSION=${{ needs.discover.outputs.alpine_version }}" >> "$GITHUB_ENV"
          echo "TARGET_ARCH=${{ matrix.arch }}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          apk add --no-cache ${APK_BUILD_DEPS}

      - name: Build libfuse
        run: |
          chmod +x "$GITHUB_WORKSPACE/scripts/package.sh"
          chmod +x "$GITHUB_WORKSPACE/scripts/build-project.sh"
          "$GITHUB_WORKSPACE/scripts/build-project.sh"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.discover.outputs.artifact_name }}
          path: /tmp/out/*.tar.gz
          if-no-files-found: error

  release:
    needs: [discover, build]
    if: needs.discover.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.discover.outputs.artifact_name }}
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.discover.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.discover.outputs.release_name }}
          SOURCE_REF: ${{ needs.discover.outputs.source_ref }}
          ALPINE_VERSION: ${{ needs.discover.outputs.alpine_version }}
        run: |
          set -eu
          ls -lah dist
          gh release create "$RELEASE_TAG" dist/*.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_NAME" \
            --notes "Automated build for libfuse ref \\`$SOURCE_REF\\` on Alpine \\`$ALPINE_VERSION\\`."
